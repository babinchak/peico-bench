# Reference: reps (the agents under test operate AS a rep) + their authority/licenses.
# New table set — supports retention-within-authority and "rep can't sell this here".
#
# discount_authority_pct  max discretionary discount a rep may grant (fraction)
# discount_authority_usd  hard dollar cap on a single discretionary credit
# can_override_uw          may approve an underwriting referral/exception
# states / lines           the build expands these into rep_licenses (state x line);
#                          a write to bind a (state, line) the rep isn't licensed for fails.
#
# Authority ladder by role:
#   AGENT 5% / $50   SENIOR_AGENT 10% / $150   RETENTION 15% / $300   SUPERVISOR 25% / $1000
# Some reps are P&C-only (no LIFE/HLTH) — that interacts with the suitability gate.

reps:
