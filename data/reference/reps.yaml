    name: Dana Whitfield
    role: AGENT
    discount_authority_pct: 0.05
    discount_authority_usd: 50
    can_override_uw: false
    states: [IL, OH, MI]
    lines: [AUTO, HOME, RENT, CONDO, PET]          # P&C only
