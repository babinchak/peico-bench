      COLL: { inc: true,  val: 1000 }
      COMP: { inc: true,  val: 1000 }
      MED:  { inc: false, edit: false }              # Evergreen+ only
      RENT_REIMB: { inc: false, edit: false }
      ROAD: { inc: false }
      GAP:  { inc: false }                           # eligibility-gated (financed only)
      OEM:  { inc: false, edit: false }              # Sequoia only
    PINE:
