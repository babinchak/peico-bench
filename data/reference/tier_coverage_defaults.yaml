# Reference: tier_coverage_defaults — the (tier x coverage) matrix.
# Maps to docs/02-data-model.md `tier_coverage_defaults`.
#
# Per cell:  inc  = included by default on this tier?
#            val  = default limit/deductible/benefit (natural units; see coverages.yaml unit)
#            edit = may the agent change it via endorsement? (default true; only set when false)
# Omit val for pure flags when inc:false. usd/usd_split/usd_daily authored in DOLLARS.
# A coverage missing from a tier's map is treated as inc:false, not editable-in.

defaults:

