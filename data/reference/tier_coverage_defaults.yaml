      # HERITAGE loses OEM+ROAD at this price and it cannot be re-bound.
      BI:   { inc: true,  val: "100000/300000" }
      PD:   { inc: true,  val: 50000 }
      UMUIM: { inc: true,  val: "100000/300000" }
      COLL: { inc: true,  val: 500 }
