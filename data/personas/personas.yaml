# Golden personas — the curated, hand-authored slice of the live world.
# These are real rows in the DB (customers the agent navigates) AND the subjects
# of early benchmark scenarios. The full ~5k random population comes later and is
# kept separate; these are reviewed like reference data.
#
# Each persona is designed to exercise a specific flow/quirk (see `covers`).
# The generator (generate.py) computes ids, peico_risk, premiums (via the rating
# engine), loyalty ledger, disclosure deliveries, payments — never authored here.
#
# Money authored in DOLLARS. Dates ISO. WORLD_ANCHOR_DATE = 2025-06-01.

